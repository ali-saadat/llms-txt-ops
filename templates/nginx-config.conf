# =====================================================================
# Nginx configuration for /llms.txt and /llms-full.txt
#
# Place this inside the appropriate server { ... } block.
# Adjust paths to your actual filesystem layout.
#
# Pairs with templates/validate.sh (run before deploy).
# See knowledge/06-deployment.md for full operational context.
# =====================================================================

# --- llms.txt -------------------------------------------------------

location = /llms.txt {
    alias /var/www/example.com/llms.txt;

    # Encoding declaration — addresses the most common operational mistake.
    # Without this, browsers and AI parsers may default to ISO-8859-1 and
    # mis-decode UTF-8 multibyte sequences (e.g., Turkish ş ğ ı, Spanish ñ,
    # Chinese characters). The result looks like corruption but the underlying
    # bytes are correct.
    default_type "text/markdown; charset=utf-8";

    # Prevent the file itself from appearing in search results.
    # John Mueller (Search Engine Journal, July 2025) explicitly said
    # noindex on llms.txt "could make sense" to keep it out of regular SERPs.
    # Do NOT also Disallow this URL in robots.txt — noindex only works
    # if the file can be crawled.
    add_header X-Robots-Tag "noindex" always;

    # 1-hour cache. Purge CDN on deploy.
    add_header Cache-Control "public, max-age=3600" always;

    # Allow cross-origin fetches in case AI tools fetch from a different origin.
    add_header Access-Control-Allow-Origin "*" always;

    # Optional: log access for monitoring
    access_log /var/log/nginx/llms_access.log llms_format;
}

# --- llms-full.txt (if you ship one) --------------------------------

location = /llms-full.txt {
    alias /var/www/example.com/llms-full.txt;

    default_type "text/markdown; charset=utf-8";
    add_header X-Robots-Tag "noindex" always;
    add_header Cache-Control "public, max-age=3600" always;
    add_header Access-Control-Allow-Origin "*" always;

    # llms-full.txt is typically MB-scale. Enable transport compression.
    gzip on;
    gzip_types text/markdown text/plain;
    gzip_min_length 1024;
    gzip_comp_level 6;

    access_log /var/log/nginx/llms_access.log llms_format;
}

# --- /.well-known/llms.txt mirror (Mintlify convention, optional) ---

# Optional. NOT in the official llmstxt.org spec — only ship this if
# you want compatibility with the Mintlify mirror convention.
location = /.well-known/llms.txt {
    alias /var/www/example.com/llms.txt;
    default_type "text/markdown; charset=utf-8";
    add_header X-Robots-Tag "noindex" always;
    add_header Cache-Control "public, max-age=3600" always;
    add_header Access-Control-Allow-Origin "*" always;
}

# --- Per-page .md mirrors (optional — content-negotiation alternative) ---

# If you ship .md mirrors of HTML pages alongside the HTML versions,
# noindex them and canonicalize to the HTML. Otherwise consider
# content negotiation (Cloudflare Markdown for Agents pattern, Feb 2026):
# same URL, Accept: text/markdown returns markdown.

# Example for .md mirrors:
# location ~* \.md$ {
#     try_files $uri =404;
#     default_type "text/markdown; charset=utf-8";
#     add_header X-Robots-Tag "noindex, nofollow" always;
#     # Canonical link header to HTML version
#     add_header Link "<$scheme://$host${request_uri%.md}>; rel=\"canonical\"" always;
# }


# --- Logging format (define in http { ... } block) ------------------
#
# In your http { ... } block, define:
#
# log_format llms_format '$remote_addr - [$time_iso8601] '
#                        '"$request" $status $body_bytes_sent '
#                        '"$http_user_agent" '
#                        'rt=$request_time';
#
# This logs:
#   - client IP
#   - ISO timestamp
#   - request line
#   - response status + size
#   - user-agent (CRITICAL — this is how you know which AI bots are fetching)
#   - request time


# --- Reminders ------------------------------------------------------
#
# 1. Verify file encoding before deploy:
#    file -bi /var/www/example.com/llms.txt
#    Expected: charset=utf-8 (no "with-bom")
#
# 2. Verify served encoding after deploy:
#    curl -I https://example.com/llms.txt | grep -i content-type
#    Expected: Content-Type: text/markdown; charset=utf-8
#
# 3. Verify byte-level integrity (catches CDN/proxy transformations):
#    shasum -a 256 /var/www/example.com/llms.txt
#    curl -s https://example.com/llms.txt | shasum -a 256
#    Hashes MUST match.
#
# 4. Purge CDN on deploy. For Cloudflare:
#    curl -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
#         -H "Authorization: Bearer $CF_API_TOKEN" \
#         -H "Content-Type: application/json" \
#         --data '{"files":["https://example.com/llms.txt","https://example.com/llms-full.txt"]}'
#
# 5. robots.txt consistency: every URL referenced from llms.txt must be
#    Allow:'ed (or at minimum not Disallow:'ed) for the AI user-agents
#    you care about. See reference/ai-bots.md for the current bot inventory.

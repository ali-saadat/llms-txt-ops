# Fly.io app config — one-click deploy via:
# https://fly.io/launch?repo=<your-fork-url>
#
# After deploy, set secrets:
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...      # only if A2A_MODE=live
#   fly secrets set A2A_API_KEYS="caller1=$(openssl rand -hex 32),caller2=..."

app = "llms-txt-advisor-a2a"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  A2A_MODE = "mock"
  A2A_RATE_LIMIT = "30"
  A2A_DB_PATH = "/data/a2a-tasks.db"
  A2A_AUDIT_LOG = "/data/a2a-audit.log"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[mounts]
  source = "a2a_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

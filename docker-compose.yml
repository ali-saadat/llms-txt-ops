# docker-compose.yml — local-dev or single-host production stack for the
# llms-txt-advisor A2A server.
#
# Quick start (mock mode, no auth, no API key):
#   docker compose up
#
# Production (live mode with auth):
#   1. cp .env.example .env
#   2. Edit .env — set ANTHROPIC_API_KEY and A2A_API_KEYS
#   3. docker compose --profile production up -d
#
# Visit http://localhost:8000/.well-known/agent-card.json once it's up.

services:
  a2a:
    build: .
    image: llms-txt-advisor:1.4.0
    container_name: llms-txt-advisor-a2a
    restart: unless-stopped
    ports:
      - "${A2A_PORT:-8000}:8000"
    environment:
      A2A_MODE: ${A2A_MODE:-mock}
      A2A_RATE_LIMIT: ${A2A_RATE_LIMIT:-30}
      A2A_DB_PATH: /data/a2a-tasks.db
      A2A_AUDIT_LOG: /data/a2a-audit.log
      # Live mode (uncomment in .env)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      A2A_MODEL: ${A2A_MODEL:-claude-sonnet-4-5-20250929}
      # Auth (uncomment in .env). Format: caller1=key1,caller2=key2
      A2A_API_KEYS: ${A2A_API_KEYS:-}
    volumes:
      - a2a-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional reverse proxy with TLS — only starts under the `production` profile.
  # Uncomment + configure if you want HTTPS termination on the same host.
  # caddy:
  #   image: caddy:2-alpine
  #   profiles: ["production"]
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #   depends_on:
  #     - a2a

volumes:
  a2a-data:
  # caddy-data:
